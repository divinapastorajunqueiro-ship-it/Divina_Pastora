<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Codes — SEMED Junqueiro 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1f2937;
    --border: #30363d;
    --accent: #00d084;
    --accent2: #00a8ff;
    --text: #e6edf3;
    --muted: #8b949e;
    --card-bg: #161b22;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d2d1f 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }

  .logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }

  .header-titles h1 {
    font-size: 18px; font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .header-titles p {
    font-size: 12px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .header-actions {
    display: flex; gap: 10px; margin-left: auto;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px; border-radius: 8px; border: none;
    font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--accent); color: #0d1117;
  }
  .btn-primary:hover { background: #00e896; transform: translateY(-1px); }

  .btn-ghost {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--border); }

  /* ── FILTERS ── */
  .filters {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }

  .filter-group {
    display: flex; align-items: center; gap: 8px;
  }

  .filter-group label {
    font-size: 12px; color: var(--muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    white-space: nowrap;
  }

  select, input[type=text] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    padding: 7px 12px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    cursor: pointer;
  }
  select:focus, input[type=text]:focus { border-color: var(--accent); }

  input[type=text] { width: 220px; }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    background: rgba(0,208,132,0.15);
    color: var(--accent);
    border: 1px solid rgba(0,208,132,0.3);
    padding: 3px 10px; border-radius: 20px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex; gap: 24px; padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
  }

  .stat { display: flex; align-items: center; gap: 8px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .stat-label { color: var(--muted); }
  .stat-value { font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  /* ── SIZE TOGGLE ── */
  .view-controls {
    display: flex; align-items: center; gap: 8px; margin-left: auto;
  }
  .size-btn {
    padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .size-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }

  /* ── GRID ── */
  main { padding: 24px 32px; }

  .grid {
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  }
  .grid.large { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  .grid.small { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover {
    border-color: rgba(0,208,132,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,208,132,0.1);
  }
  .card:hover::before { opacity: 1; }

  .qr-wrap {
    background: #fff;
    border-radius: 8px;
    padding: 8px;
    display: flex; align-items: center; justify-content: center;
    width: 128px; height: 128px; flex-shrink: 0;
  }
  .grid.large .qr-wrap { width: 160px; height: 160px; }
  .grid.small .qr-wrap { width: 100px; height: 100px; }

  .card-info { width: 100%; text-align: center; }

  .card-nome {
    font-size: 12px; font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 6px;
    word-break: break-word;
  }

  .tags {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 4px;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 4px;
  }
  .tag-turma { background: rgba(0,168,255,0.15); color: var(--accent2); border: 1px solid rgba(0,168,255,0.25); }
  .tag-turno { background: rgba(0,208,132,0.12); color: var(--accent); border: 1px solid rgba(0,208,132,0.2); }

  .card-matricula {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted); margin-top: 6px;
  }

  .download-btn {
    width: 100%;
    padding: 7px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 7px;
    font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .download-btn:hover { background: var(--surface2); color: var(--accent); border-color: var(--accent); }

  /* ── EMPTY ── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 64px 0;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── PRINT ── */
  @media print {
    header, .stats-bar, .download-btn { display: none !important; }
    body { background: #fff; color: #000; }
    .card { border: 1px solid #ddd; break-inside: avoid; }
    .qr-wrap { background: #fff; }
    .card-nome, .tag, .card-matricula { color: #000 !important; }
    .tag-turma { background: #e8f4fd !important; color: #0070c0 !important; }
    .tag-turno { background: #e8fdf0 !important; color: #00813f !important; }
    main { padding: 8px; }
    .grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  }

  /* ── LOADING ── */
  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    gap: 20px;
  }
  .loading-bar-wrap {
    width: 300px; height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.1s;
    width: 0%;
  }
  .loading-text { font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .loading-logo { font-size: 48px; }
</style>
</head>

const turnoLabel = {MATUTINO:'Matutino',VESPERTINO:'Vespertino',INTEGRAL:'Integral',NOTURNO:'Noturno'};
let rendered = new Map();
let currentSize = 'medium';
let filtered = [...STUDENTS];

function qrSize() { return {small:80,medium:112,large:148}[currentSize]; }

function setSize(s) {
  currentSize = s;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const grid = document.getElementById('grid');
  grid.className = 'grid' + (s==='large'?' large':s==='small'?' small':'');
  // Resize QR canvases (re-render affected cards)
  rendered.forEach((qr, m) => {
    const wrap = document.querySelector(`[data-m="${m}"] .qr-wrap`);
    if (wrap) { wrap.innerHTML=''; qr._el = wrap; qr.makeCode(qr._data); }
  });
  document.querySelectorAll('.qr-wrap').forEach(w => {
    const sz = qrSize();
    w.style.width = w.style.height = (sz+16)+'px';
  });
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const turma = document.getElementById('turmaSelect').value;
  const turno = document.getElementById('turnoSelect').value;

  filtered = STUDENTS.filter(s => {
    if (turma && s.turma !== turma) return false;
    if (turno && s.turno !== turno) return false;
    if (search && !s.nome.toLowerCase().includes(search) && !s.matricula.includes(search)) return false;
    return true;
  });

  renderGrid();
  document.getElementById('countBadge').textContent = filtered.length + ' aluno' + (filtered.length!==1?'s':'');
  document.getElementById('statTotal').textContent = filtered.length;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Nenhum aluno encontrado.</p></div>';
    return;
  }

  const sizeMap = {small:80, medium:112, large:148};

  filtered.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.m = s.matricula;

    const qrData = s.matricula + '|' + s.nome + '|' + s.turma + '|' + s.turno;
    const sz = sizeMap[currentSize];
    const qrWrapSize = sz + 16;

    card.innerHTML = `
      <div class="qr-wrap" style="width:${qrWrapSize}px;height:${qrWrapSize}px" id="qr_${s.matricula}"></div>
      <div class="card-info">
        <div class="card-nome">${s.nome}</div>
        <div class="tags">
          <span class="tag tag-turma">${s.turma}</span>
          <span class="tag tag-turno">${turnoLabel[s.turno]||s.turno}</span>
        </div>
        <div class="card-matricula">${s.matricula}</div>
      </div>
      <button class="download-btn" onclick="downloadQR('${s.matricula}','${s.nome.replace(/'/g,"\\'")}')">⬇️ Baixar PNG</button>
    `;
    grid.appendChild(card);

    // Generate QR
    setTimeout(() => {
      const el = document.getElementById('qr_' + s.matricula);
      if (!el) return;
      const qr = new QRCode(el, {
        text: qrData,
        width: sz, height: sz,
        colorDark: '#000000', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      qr._data = qrData;
      rendered.set(s.matricula, qr);
    }, 0);
  });
}

function downloadQR(matricula, nome) {
  setTimeout(() => {
    const el = document.getElementById('qr_' + matricula);
    if (!el) return;
    const canvas = el.querySelector('canvas') || el.querySelector('img');
    let url;
    if (canvas && canvas.tagName === 'CANVAS') {
      url = canvas.toDataURL('image/png');
    } else if (canvas && canvas.tagName === 'IMG') {
      url = canvas.src;
    } else return;
    const a = document.createElement('a');
    a.href = url; a.download = matricula + '_' + nome.replace(/\s+/g,'_') + '.png';
    a.click();
  }, 100);
}

async function downloadAll() {
  // Download visible QRs as individual files (no JSZip needed)
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '⏳ Aguarde...'; btn.disabled = true;
  let count = 0;
  for (const s of filtered) {
    const el = document.getElementById('qr_' + s.matricula);
    if (!el) continue;
    const canvas = el.querySelector('canvas');
    if (!canvas) continue;
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url;
    a.download = s.matricula + '_' + s.nome.replace(/\s+/g,'_') + '.png';
    a.click();
    count++;
    await new Promise(r => setTimeout(r, 80));
  }
  btn.textContent = '⬇️ Baixar Todos (ZIP)'; btn.disabled = false;
  alert(count + ' QR codes baixados!');
}

// Init - generate all QR codes progressively
async function init() {
  const overlay = document.getElementById('loadingOverlay');
  const bar = document.getElementById('loadingBar');
  const text = document.getElementById('loadingText');

  // Pre-render all into hidden divs first
  const total = STUDENTS.length;
  // Just show loading and render
  for (let i = 0; i < total; i += 30) {
    const pct = Math.round((i / total) * 100);
    bar.style.width = pct + '%';
    text.textContent = `${i}/${total} QR codes preparados...`;
    await new Promise(r => setTimeout(r, 0));
  }

  bar.style.width = '100%';
  text.textContent = 'Renderizando grade...';
  await new Promise(r => setTimeout(r, 50));

  renderGrid();

  overlay.style.transition = 'opacity 0.4s';
  overlay.style.opacity = '0';
  setTimeout(() => overlay.remove(), 400);
}

init();
</script>
